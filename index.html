<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> QR To Text</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        h2 {
            color: #1a73e8;
            margin-top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        #drop-zone {
            border: 3px dashed #1a73e8;
            padding: 60px 20px;
            border-radius: 12px;
            cursor: pointer;
            background: #f8fbff;
            color: #1a73e8;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Drag & Drop Hover State */
        #drop-zone.dragging {
            background: #e1efff;
            border-color: #0d47a1;
            transform: scale(1.02);
        }

        #drop-zone i {
            font-size: 50px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-top: 25px;
            border: 1px solid #ced4da;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            background: #fdfdfd;
            box-sizing: border-box;
        }

        .status {
            margin-top: 20px;
            font-weight: 600;
            min-height: 24px;
        }

        canvas {
            display: none;
        }

        .instruction {
            font-size: 13px;
            color: #5f6368;
            margin-top: 10px;
            font-weight: normal;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2><i class="fas fa-qrcode"></i> QR to Text</h2>

        <div id="drop-zone">
            <i class="fas fa-file-import"></i>
            <span>Drop QR Image Here or Click to Upload</span>
            <span class="instruction">Supports PNG, JPG, WEBP</span>
        </div>

        <input type="file" id="file-input" hidden accept="image/*">

        <div id="status" class="status"></div>

        <textarea id="result" placeholder="Decoded content will appear here..." readonly></textarea>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');

        // Click to upload
        dropZone.onclick = () => fileInput.click();

        // Drag and Drop Logic
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        dropZone.addEventListener('dragenter', () => dropZone.classList.add('dragging'));
        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragging'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));

        dropZone.addEventListener('drop', (e) => {
            dropZone.classList.remove('dragging');
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        fileInput.onchange = (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        };

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                status.innerHTML = '<i class="fas fa-times-circle"></i> Please upload an image file.';
                status.style.color = "red";
                return;
            }

            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing image...';
            status.style.color = "#1a73e8";

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // 1. Add massive 100px padding to fix "Quiet Zone" issues
                    const p = 100;
                    canvas.width = img.width + (p * 2);
                    canvas.height = img.height + (p * 2);

                    // 2. Apply high contrast and grayscale filters for better recognition
                    ctx.filter = 'grayscale(100%) contrast(250%)';
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, p, p);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    if (code) {
                        result.value = code.data;
                        status.innerHTML = '<i class="fas fa-check-circle"></i> SUCCESS!';
                        status.style.color = "green";
                    } else {
                        status.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Decoding failed. The image may be too distorted.';
                        status.style.color = "red";
                        result.value = "";
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>

</html>
