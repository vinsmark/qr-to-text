<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR To Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #1a73e8;
            --blue-dark: #1558b0;
            --blue-light: #e8f0fe;
            --green: #137333;
            --green-bg: #e6f4ea;
            --green-border: #81c995;
            --red: #c5221f;
            --red-bg: #fce8e6;
            --surface: #f8faff;
            --border: #dde3f0;
            --text: #1c2033;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --radius: 14px;
            --radius-sm: 9px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #eef1f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: clamp(16px, 4vw, 40px) clamp(12px, 4vw, 24px);
        }

        /* ── Header ── */
        .app-header {
            width: 100%;
            max-width: 520px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: clamp(16px, 3vw, 28px);
        }

        .app-header .logo-icon {
            width: clamp(36px, 8vw, 44px);
            height: clamp(36px, 8vw, 44px);
            background: var(--blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: clamp(16px, 4vw, 20px);
            flex-shrink: 0;
        }

        .app-header h1 {
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .app-header p {
            font-size: clamp(11px, 2.5vw, 13px);
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* ── Card ── */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: clamp(16px, 5vw, 32px);
            width: 100%;
            max-width: 520px;
            box-shadow: 0 4px 24px rgba(26, 115, 232, 0.07);
        }

        /* ── Tabs ── */
        .tab-switcher {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 20px;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: clamp(8px, 2.5vw, 11px) 4px;
            border: none;
            border-radius: 7px;
            background: transparent;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1.5vw, 8px);
            white-space: nowrap;
        }

        .tab-btn i {
            font-size: clamp(13px, 3vw, 15px);
            flex-shrink: 0;
        }

        .tab-btn.active {
            background: var(--card-bg);
            color: var(--blue);
            font-weight: 600;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.09);
        }

        /* ── Drop Zone ── */
        #drop-zone {
            border: 2px dashed var(--blue);
            padding: clamp(32px, 8vw, 52px) 20px;
            border-radius: var(--radius);
            cursor: pointer;
            background: var(--blue-light);
            color: var(--blue);
            font-weight: 600;
            font-size: clamp(13px, 3.5vw, 15px);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        #drop-zone:hover,
        #drop-zone.dragging {
            background: #d2e3fc;
            border-color: var(--blue-dark);
            transform: scale(1.01);
        }

        #drop-zone .dz-icon {
            width: clamp(44px, 12vw, 60px);
            height: clamp(44px, 12vw, 60px);
            background: var(--blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: clamp(18px, 5vw, 24px);
            margin-bottom: 4px;
        }

        .dz-sub {
            font-size: clamp(11px, 2.5vw, 13px);
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ── Camera ── */
        #camera-section {
            display: none;
        }

        #camera-section.active {
            display: block;
        }

        #upload-section.hidden {
            display: none;
        }

        .camera-preview-wrapper {
            position: relative;
            width: 100%;
            border-radius: var(--radius);
            overflow: hidden;
            background: #0d1117;
            aspect-ratio: 1 / 1;
        }

        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 58%;
            height: 58%;
            position: relative;
        }

        /* Corner brackets only */
        .scan-frame::before,
        .scan-frame::after,
        .scan-corner-bl,
        .scan-corner-br {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            border-color: white;
            border-style: solid;
        }

        .scan-frame::before {
            top: 0;
            left: 0;
            border-width: 3px 0 0 3px;
            border-radius: 4px 0 0 0;
        }

        .scan-frame::after {
            top: 0;
            right: 0;
            border-width: 3px 3px 0 0;
            border-radius: 0 4px 0 0;
        }

        .scan-corner-bl {
            bottom: 0;
            left: 0;
            border-width: 0 0 3px 3px;
            border-radius: 0 0 0 4px;
        }

        .scan-corner-br {
            bottom: 0;
            right: 0;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 4px 0;
        }

        .scan-dimmer {
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 0 9999px rgba(0, 0, 0, 0.42);
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #1a73e8 40%, #60a5fa, #1a73e8 60%, transparent);
            animation: scanMove 2.2s ease-in-out infinite;
        }

        @keyframes scanMove {
            0% {
                top: 4px;
                opacity: 0;
            }

            8% {
                opacity: 1;
            }

            92% {
                opacity: 1;
            }

            100% {
                top: calc(100% - 6px);
                opacity: 0;
            }
        }

        .camera-tip {
            margin-top: 10px;
            font-size: clamp(11px, 2.8vw, 13px);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
        }

        .camera-controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            padding: clamp(9px, 2.5vw, 12px) 8px;
            border-radius: var(--radius-sm);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1.5vw, 7px);
            transition: all 0.18s ease;
            white-space: nowrap;
        }

        .btn i {
            font-size: clamp(12px, 3vw, 14px);
            flex-shrink: 0;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #e5e9f2;
        }

        .btn-danger {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid #f5b8b6;
        }

        .btn-danger:hover {
            background: #f9d0cf;
        }

        /* ── Status ── */
        .status {
            margin-top: 16px;
            font-weight: 600;
            font-size: clamp(12px, 3vw, 14px);
            min-height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        /* ── Result Box ── */
        .result-box {
            margin-top: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            overflow: hidden;
            display: none;
        }

        .result-box.visible {
            display: block;
        }

        .result-label {
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            background: #f0f3fa;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-content {
            padding: clamp(10px, 3vw, 14px);
            font-family: 'DM Mono', monospace;
            font-size: clamp(12px, 3vw, 14px);
            word-break: break-all;
            color: var(--text);
            line-height: 1.6;
        }

        .result-content a {
            color: var(--blue);
            text-decoration: underline;
            cursor: pointer;
        }

        /* ── Go Banner ── */
        .go-banner {
            margin-top: 12px;
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            border-radius: var(--radius-sm);
            padding: clamp(10px, 3vw, 13px) clamp(12px, 3.5vw, 16px);
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .go-banner.visible {
            display: flex;
        }

        .go-banner-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(12px, 3vw, 13px);
            color: var(--green);
            font-weight: 600;
        }

        .go-banner-left i {
            font-size: clamp(14px, 3.5vw, 16px);
            flex-shrink: 0;
        }

        .go-btn {
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 7px;
            padding: clamp(7px, 2vw, 9px) clamp(12px, 3.5vw, 18px);
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(12px, 3vw, 13px);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: background 0.18s;
            flex-shrink: 0;
        }

        .go-btn i {
            font-size: clamp(11px, 2.5vw, 13px);
        }

        .go-btn:hover {
            background: var(--blue-dark);
        }

        /* ── No Camera ── */
        .no-camera-msg {
            padding: clamp(28px, 8vw, 44px) 20px;
            color: var(--text-muted);
            font-size: clamp(13px, 3.5vw, 14px);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            display: none;
            text-align: center;
            line-height: 1.6;
        }

        .no-camera-msg i {
            font-size: clamp(28px, 8vw, 36px);
            display: block;
            margin-bottom: 10px;
        }

        canvas {
            display: none;
        }

        /* ── Very small screens ── */
        @media (max-width: 360px) {
            .tab-btn span {
                display: none;
            }

            .tab-btn i {
                font-size: 16px;
            }

            .btn span {
                display: none;
            }

            .btn i {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="app-header">
        <div class="logo-icon"><i class="fas fa-qrcode"></i></div>
        <div>
            <h1>QR to Text</h1>
            <p>Scan or upload a QR code to decode it</p>
        </div>
    </div>

    <!-- Card -->
    <div class="card">

        <!-- Tabs -->
        <div class="tab-switcher">
            <button class="tab-btn active" id="tab-upload" onclick="switchTab('upload')">
                <i class="fas fa-file-import"></i><span>Upload Image</span>
            </button>
            <button class="tab-btn" id="tab-camera" onclick="switchTab('camera')">
                <i class="fas fa-camera"></i><span>Scan via Camera</span>
            </button>
        </div>

        <!-- Upload Section -->
        <div id="upload-section">
            <div id="drop-zone">
                <div class="dz-icon"><i class="fas fa-file-arrow-up"></i></div>
                <span>Drop QR Image Here or Click to Upload</span>
                <span class="dz-sub">Supports PNG, JPG, WEBP</span>
            </div>
            <input type="file" id="file-input" hidden accept="image/*">
        </div>

        <!-- Camera Section -->
        <div id="camera-section">
            <div class="camera-preview-wrapper">
                <video id="camera-video" autoplay playsinline muted></video>
                <div class="scan-overlay">
                    <div class="scan-dimmer"></div>
                    <div class="scan-frame">
                        <div class="scan-corner-bl"></div>
                        <div class="scan-corner-br"></div>
                        <div class="scan-line"></div>
                    </div>
                </div>
            </div>

            <p class="camera-tip">
                <i class="fas fa-circle-info"></i>
                Hold a QR code inside the frame — it scans automatically.
            </p>

            <div class="camera-controls">
                <button class="btn btn-secondary" onclick="flipCamera()">
                    <i class="fas fa-rotate"></i><span>Flip Camera</span>
                </button>
                <button class="btn btn-danger" onclick="stopCameraAndReset()">
                    <i class="fas fa-stop-circle"></i><span>Stop Camera</span>
                </button>
            </div>

            <div class="no-camera-msg" id="no-camera-msg">
                <i class="fas fa-video-slash"></i>
                Camera not available or permission denied.<br>Please use the Upload tab instead.
            </div>
        </div>

        <!-- Status -->
        <div id="status" class="status"></div>

        <!-- Result -->
        <div class="result-box" id="result-box">
            <div class="result-label"><i class="fas fa-code"></i> Decoded Content</div>
            <div class="result-content" id="result-content"></div>
        </div>

        <!-- Go to Website Banner -->
        <div class="go-banner" id="go-banner">
            <div class="go-banner-left">
                <i class="fas fa-check-circle"></i>
                <span>URL detected</span>
            </div>
            <button class="go-btn" onclick="goToWebsite()">
                Go to Website <i class="fas fa-arrow-up-right-from-square"></i>
            </button>
        </div>

    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const status = document.getElementById('status');
        const resultBox = document.getElementById('result-box');
        const resultContent = document.getElementById('result-content');
        const goBanner = document.getElementById('go-banner');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('camera-video');

        let stream = null;
        let scanInterval = null;
        let facingMode = 'environment';
        let detectedURL = null;

        /* ── Tabs ── */
        function switchTab(tab) {
            document.getElementById('tab-upload').classList.toggle('active', tab === 'upload');
            document.getElementById('tab-camera').classList.toggle('active', tab === 'camera');
            document.getElementById('upload-section').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('camera-section').classList.toggle('active', tab === 'camera');
            clearResult();
            if (tab === 'camera') startCamera();
            else stopCamera();
        }

        /* ── Upload / Drop ── */
        dropZone.onclick = () => fileInput.click();

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev =>
            dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); })
        );
        dropZone.addEventListener('dragenter', () => dropZone.classList.add('dragging'));
        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragging'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
        dropZone.addEventListener('drop', e => {
            dropZone.classList.remove('dragging');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.onchange = e => { if (e.target.files.length) handleFile(e.target.files[0]); };

        function handleFile(file) {
            if (!file.type.startsWith('image/')) { showStatus('error', 'Please upload an image file.'); return; }
            showStatus('loading', 'Processing image...');
            clearResult();
            const reader = new FileReader();
            reader.onload = event => {
                const img = new Image();
                img.onload = () => {
                    const p = 100;
                    canvas.width = img.width + p * 2;
                    canvas.height = img.height + p * 2;
                    ctx.filter = 'grayscale(100%) contrast(250%)';
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, p, p);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    if (code) { showStatus('success', 'Decoded successfully!'); displayResult(code.data); }
                    else { showStatus('error', 'Decoding failed. The image may be too distorted.'); }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        /* ── Camera ── */
        async function startCamera() {
            const noCamMsg = document.getElementById('no-camera-msg');
            noCamMsg.style.display = 'none';
            video.style.display = 'block';
            if (!navigator.mediaDevices?.getUserMedia) {
                noCamMsg.style.display = 'block'; video.style.display = 'none'; return;
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: facingMode } } });
                video.srcObject = stream;
                startScanning();
            } catch {
                noCamMsg.style.display = 'block';
                video.style.display = 'none';
                showStatus('error', 'Camera permission denied.');
            }
        }

        function stopCamera() {
            stream?.getTracks().forEach(t => t.stop());
            stream = null;
            if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
            video.srcObject = null;
        }

        function stopCameraAndReset() {
            stopCamera();
            switchTab('upload');
        }

        async function flipCamera() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            stopCamera(); await startCamera();
        }

        function startScanning() {
            if (scanInterval) clearInterval(scanInterval);
            scanInterval = setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.filter = 'none';
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
                    if (code) {
                        clearInterval(scanInterval); scanInterval = null;
                        showStatus('success', 'QR code scanned!');
                        displayResult(code.data);
                        stopCamera();
                    }
                }
            }, 300);
        }

        /* ── Result ── */
        function displayResult(text) {
            resultBox.classList.add('visible');
            detectedURL = null;
            if (isURL(text)) {
                detectedURL = text.startsWith('http') ? text : 'https://' + text;
                resultContent.innerHTML = `<a onclick="goToWebsite()" title="Open link">${escapeHTML(text)}</a>`;
                goBanner.classList.add('visible');
            } else {
                resultContent.textContent = text;
                goBanner.classList.remove('visible');
            }
        }

        function clearResult() {
            resultBox.classList.remove('visible');
            goBanner.classList.remove('visible');
            resultContent.innerHTML = '';
            detectedURL = null;
            status.innerHTML = '';
        }

        function isURL(str) {
            try { const u = new URL(str.startsWith('http') ? str : 'https://' + str); return u.hostname.includes('.'); }
            catch { return false; }
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function goToWebsite() {
            if (detectedURL) window.open(detectedURL, '_blank', 'noopener,noreferrer');
        }

        /* ── Status ── */
        function showStatus(type, message) {
            const icons = { loading: '<i class="fas fa-spinner fa-spin"></i>', success: '<i class="fas fa-circle-check"></i>', error: '<i class="fas fa-triangle-exclamation"></i>' };
            const colors = { loading: '#1a73e8', success: '#137333', error: '#c5221f' };
            status.innerHTML = `${icons[type]} ${message}`;
            status.style.color = colors[type];
        }
    </script>
</body>

</html>
